<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WatchTogether</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 400px;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #e50914;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 11px;
      color: #888;
      margin-bottom: 24px;
    }

    .mode-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      text-align: center;
      transition: all 0.2s;
    }

    .mode-btn.active {
      border-color: #e50914;
      color: #fff;
      background: #2a0a0a;
    }

    .mode-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }

    .section { margin-bottom: 16px; }

    label {
      font-size: 11px;
      color: #888;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }

    input:focus { border-color: #e50914; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e50914; color: #fff; }
    .btn-secondary { background: #1a1a1a; color: #ccc; border: 1px solid #333; }

    .status {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }

    .status.error { color: #e50914; }
    .status.success { color: #2ecc71; }

    .invite-box {
      display: none;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      margin-top: 12px;
      font-size: 11px;
      color: #888;
      word-break: break-all;
    }

    .invite-box span { color: #fff; display: block; margin-top: 4px; }
  </style>
</head>
<body>

  <div class="logo">🎬 WatchTogether</div>
  <div class="tagline">Watch with someone special</div>

  <!-- Mode selector: Together (2 people) or Hangout (up to 10) -->
  <div class="mode-selector">
    <div class="mode-btn active" data-mode="together">
      <span class="icon">💑</span>Together
    </div>
    <div class="mode-btn" data-mode="hangout">
      <span class="icon">🎉</span>Hangout
    </div>
  </div>

  <div class="section">
    <label>Your Name</label>
    <input type="text" id="displayName" placeholder="Enter your name" maxlength="20" />
  </div>

  <div class="section" id="joinSection">
    <label>Have an invite code?</label>
    <input type="text" id="roomIdInput" placeholder="Enter room code" maxlength="6" />
  </div>

  <button class="btn btn-primary" id="createBtn">Create Room</button>
  <button class="btn btn-secondary" id="joinBtn">Join Room</button>

  <div class="invite-box" id="inviteBox">
    Room code: <span id="inviteCode"></span>
    Expires in 10 minutes
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
